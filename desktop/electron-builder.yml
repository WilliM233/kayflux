appId: com.kayflux.app
productName: KayFlux
copyright: MIT

directories:
  output: dist

files:
  - main.js
  - preload.js
  - src/**/*
  - assets/**/*
  - package.json

asarUnpack:
  - "node_modules/better-sqlite3/**"

extraResources:
  - from: ../server.js
    to: server/server.js
  - from: ../schema.sql
    to: server/schema.sql
  - from: ../seed-default.js
    to: server/seed-default.js
  - from: ../public
    to: server/public

win:
  target: nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico

mac:
  target: dmg
  icon: assets/icon.icns
  category: public.app-category.sports-games

dmg:
  backgroundColor: "#0d0d0d"

linux:
  target: AppImage
  icon: assets/icon.png
  category: Game

publish:
  provider: github
  owner: WilliM233
  repo: kayflux
