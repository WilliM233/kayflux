services:
  kayflux:
    image: ghcr.io/willim233/kayflux:latest
    container_name: kayflux
    restart: unless-stopped
    ports:
      - "${KAYFLUX_PORT:-3030}:3000"
    volumes:
      - kayflux-data:/data
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/brands"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  kayflux-data:
